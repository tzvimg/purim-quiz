<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק זיכרון תחפושות פורים</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #fda085 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 15px;
            color: white;
        }

        .game-header h1 {
            font-size: 1.8em;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 4px;
        }

        .game-header .emoji-row {
            font-size: 32px;
            margin-bottom: 4px;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 12px;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 8px 20px;
            color: white;
            font-size: 1.05em;
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
        }

        .board {
            display: grid;
            gap: 10px;
            max-width: 500px;
            width: 100%;
            perspective: 1000px;
        }

        .board.size-4x3 {
            grid-template-columns: repeat(4, 1fr);
        }

        .board.size-4x4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .board.size-4x5 {
            grid-template-columns: repeat(4, 1fr);
        }

        .card {
            aspect-ratio: 1;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            border-radius: 16px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            animation: matchPop 0.6s ease;
        }

        .card.matched .card-front {
            background: linear-gradient(135deg, #d4edda, #b8f0c0);
            border-color: #28a745;
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.4);
        }

        @keyframes matchPop {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.15); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 3px solid;
        }

        .card-back {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #5a3d8a;
            color: white;
            font-size: 2.5em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card-back::after {
            content: '🎭';
        }

        .card-front {
            background: white;
            border-color: #e0e0e0;
            transform: rotateY(180deg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card-emoji {
            font-size: 2.8em;
            line-height: 1;
        }

        .card-label {
            font-size: 0.7em;
            color: #555;
            margin-top: 4px;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .card-emoji {
                font-size: 2.2em;
            }
            .card-label {
                font-size: 0.6em;
            }
            .board {
                gap: 7px;
            }
        }

        .card:not(.flipped):not(.matched):hover .card-back {
            box-shadow: 0 6px 25px rgba(0,0,0,0.35);
            border-color: #fff;
        }

        .card:not(.flipped):not(.matched):active .card-back {
            transform: scale(0.95);
        }

        /* Level select */
        .level-screen {
            background: white;
            border-radius: 24px;
            padding: 35px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .level-screen h1 {
            color: #f5576c;
            font-size: 1.8em;
            margin-bottom: 6px;
        }

        .level-screen .emoji-row {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .level-screen .subtitle {
            color: #888;
            margin-bottom: 25px;
            font-size: 1.05em;
        }

        .level-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .level-btn {
            width: 80%;
            max-width: 280px;
            padding: 14px 20px;
            border: none;
            border-radius: 16px;
            font-size: 1.15em;
            font-family: inherit;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .level-btn:hover {
            transform: scale(1.05);
        }

        .level-btn.easy {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);
        }

        .level-btn.medium {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .level-btn.hard {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            box-shadow: 0 4px 15px rgba(247, 151, 30, 0.4);
        }

        .level-desc {
            color: #999;
            font-size: 0.85em;
            margin-top: -4px;
        }

        /* Win screen */
        .win-screen {
            display: none;
            background: white;
            border-radius: 24px;
            padding: 35px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .win-emoji {
            font-size: 64px;
            margin-bottom: 10px;
        }

        .win-title {
            font-size: 1.8em;
            color: #f5576c;
            margin-bottom: 8px;
        }

        .win-stats {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.8;
        }

        .win-stars {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .win-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .win-btn {
            padding: 12px 36px;
            border: none;
            border-radius: 16px;
            font-size: 1.1em;
            font-family: inherit;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            transition: transform 0.2s;
            width: 70%;
            max-width: 250px;
        }

        .win-btn:hover {
            transform: scale(1.05);
        }

        .win-btn.secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .nav-link {
            display: inline-block;
            margin-top: 15px;
            color: white;
            text-decoration: none;
            font-size: 1em;
            opacity: 0.85;
            transition: opacity 0.2s;
        }

        .nav-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: -10px;
            font-size: 24px;
            animation: fall linear forwards;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Costume parade */
        .parade-container {
            display: none;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .parade-title {
            color: white;
            font-size: 1.5em;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        .parade-stage {
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .parade-costume {
            text-align: center;
            animation: costumeIn 0.6s ease;
        }

        @keyframes costumeIn {
            from { transform: scale(0.3) rotate(-20deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .parade-emoji {
            font-size: 100px;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .parade-name {
            font-size: 1.8em;
            color: #f5576c;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .parade-desc {
            font-size: 1em;
            color: #777;
            margin-bottom: 20px;
            max-width: 300px;
        }

        .parade-nav {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .parade-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 14px;
            font-size: 1em;
            font-family: inherit;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            transition: transform 0.2s;
        }

        .parade-btn:hover {
            transform: scale(1.05);
        }

        .parade-btn.auto {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
        }

        .parade-btn.auto.playing {
            background: linear-gradient(135deg, #f7971e, #ffd200);
        }

        .parade-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }

        .parade-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ddd;
            transition: background 0.3s;
        }

        .parade-dot.active {
            background: #f5576c;
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .mode-tab {
            padding: 10px 24px;
            border: 3px solid #eee;
            border-radius: 14px;
            background: white;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            color: #555;
        }

        .mode-tab:hover {
            border-color: #f5576c;
        }

        .mode-tab.active {
            border-color: #f5576c;
            background: #fff0f3;
            color: #f5576c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Mode Selection -->
    <div class="level-screen" id="mainMenu">
        <div class="emoji-row">👸🤴🦁🧙‍♂️</div>
        <h1>תחפושות פורים</h1>
        <p class="subtitle">בחרו מה לשחק!</p>

        <div class="mode-tabs">
            <button class="mode-tab active" onclick="switchMode('memory')">🃏 משחק זיכרון</button>
            <button class="mode-tab" onclick="switchMode('parade')">🎪 תצוגת תחפושות</button>
        </div>

        <!-- Memory level options -->
        <div id="memoryOptions" class="level-options">
            <button class="level-btn easy" onclick="startGame(6)">🌟 קל - 6 זוגות</button>
            <span class="level-desc">לוח 4×3</span>
            <button class="level-btn medium" onclick="startGame(8)">💪 בינוני - 8 זוגות</button>
            <span class="level-desc">לוח 4×4</span>
            <button class="level-btn hard" onclick="startGame(10)">🔥 קשה - 10 זוגות</button>
            <span class="level-desc">לוח 4×5</span>
        </div>

        <!-- Parade option -->
        <div id="paradeOptions" class="level-options" style="display:none;">
            <button class="level-btn medium" onclick="startParade()">🎪 צפו בתצוגה!</button>
            <span class="level-desc">הכירו את כל התחפושות של פורים</span>
        </div>

        <a href="index.html" class="nav-link" style="color: #f5576c; margin-top:20px;">➜ לחידון הפורים</a>
    </div>

    <!-- Game Board -->
    <div id="gameArea" style="display:none; width:100%; display:none; flex-direction:column; align-items:center;">
        <div class="game-header">
            <div class="emoji-row">🃏✨🎭</div>
            <h1>משחק זיכרון תחפושות</h1>
        </div>
        <div class="stats">
            <div class="stat" id="movesDisplay">מהלכים: 0</div>
            <div class="stat" id="pairsDisplay">זוגות: 0/0</div>
            <div class="stat" id="timerDisplay">⏱️ 0:00</div>
        </div>
        <div class="board" id="board"></div>
        <a href="#" class="nav-link" onclick="backToMenu(); return false;">↩ חזרה לתפריט</a>
    </div>

    <!-- Win Screen -->
    <div class="win-screen" id="winScreen">
        <div class="win-emoji">🎉👑🏆</div>
        <div class="win-title">כל הכבוד!</div>
        <div class="win-stats" id="winStats"></div>
        <div class="win-stars" id="winStars"></div>
        <div class="win-btns">
            <button class="win-btn" onclick="startGame(lastPairs)">🔄 שחקו שוב</button>
            <button class="win-btn secondary" onclick="backToMenu()">↩ חזרה לתפריט</button>
        </div>
    </div>

    <!-- Costume Parade -->
    <div class="parade-container" id="paradeArea">
        <div class="parade-title">🎪 תצוגת תחפושות פורים 🎪</div>
        <div class="parade-stage">
            <div class="parade-costume" id="paradeCostume">
                <div class="parade-emoji" id="paradeEmoji"></div>
                <div class="parade-name" id="paradeName"></div>
                <div class="parade-desc" id="paradeDesc"></div>
            </div>
            <div class="parade-nav">
                <button class="parade-btn" onclick="prevCostume()">→ הקודם</button>
                <button class="parade-btn auto" id="autoBtn" onclick="toggleAutoPlay()">▶ תצוגה אוטומטית</button>
                <button class="parade-btn" onclick="nextCostume()">הבא ←</button>
            </div>
            <div class="parade-dots" id="paradeDots"></div>
        </div>
        <a href="#" class="nav-link" onclick="backToMenu(); return false;">↩ חזרה לתפריט</a>
    </div>

    <script>
        // All costumes data
        const allCostumes = [
            { emoji: "👸", label: "אסתר המלכה", desc: "המלכה האמיצה שהצילה את עם ישראל" },
            { emoji: "🤴", label: "המלך אחשוורוש", desc: "מלך פרס ומדי ששלט על 127 מדינות" },
            { emoji: "🧙‍♂️", label: "מרדכי הצדיק", desc: "דודה של אסתר, ישב בשער המלך" },
            { emoji: "😈", label: "המן הרשע", desc: "הרשע שרצה להשמיד את היהודים" },
            { emoji: "🦁", label: "אריה", desc: "מלך החיות - תחפושת אמיצה!" },
            { emoji: "🧚‍♀️", label: "פיה", desc: "פיה קסומה עם כנפיים נוצצות" },
            { emoji: "🦸‍♂️", label: "גיבור-על", desc: "גיבור אמיץ שמציל את העולם" },
            { emoji: "🤠", label: "קאובוי", desc: "קאובוי מהמערב הפרוע - יי-הא!" },
            { emoji: "👩‍🚀", label: "אסטרונאוטית", desc: "טסה לחלל עם חליפת חלל" },
            { emoji: "🧛", label: "ערפד", desc: "ערפד מפחיד שיוצא בלילה" },
            { emoji: "🤡", label: "ליצן", desc: "ליצן מצחיק שמשמח את כולם" },
            { emoji: "👨‍🍳", label: "שף", desc: "שף מקצועי שמבשל אוכל טעים" },
            { emoji: "🧜‍♀️", label: "בת ים", desc: "בת ים יפה עם זנב מנצנץ" },
            { emoji: "🥷", label: "נינג'ה", desc: "נינג'ה חמקמק ומהיר כמו הרוח" },
            { emoji: "👩‍⚕️", label: "רופאה", desc: "רופאה שמרפאה ועוזרת לכולם" },
            { emoji: "🧑‍🚒", label: "כבאי", desc: "כבאי אמיץ שמכבה שריפות" },
            { emoji: "🦄", label: "חד-קרן", desc: "חד-קרן קסום עם קרן מנצנצת" },
            { emoji: "🐱", label: "חתול", desc: "חתול חמוד עם שפם ואוזניים" },
            { emoji: "🏴‍☠️", label: "פיראט", desc: "פיראט עם כובע ורטייה על העין" },
            { emoji: "🧝‍♀️", label: "אלפית", desc: "אלפית מהיער הקסום עם אוזניים מחודדות" }
        ];

        // Memory game state
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let totalPairs = 0;
        let moves = 0;
        let gameActive = false;
        let lastPairs = 8;
        let timerInterval = null;
        let seconds = 0;

        // Parade state
        let paradeIndex = 0;
        let autoPlayInterval = null;

        function switchMode(mode) {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('memoryOptions').style.display = mode === 'memory' ? 'flex' : 'none';
            document.getElementById('paradeOptions').style.display = mode === 'parade' ? 'flex' : 'none';
        }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startGame(pairs) {
            lastPairs = pairs;
            totalPairs = pairs;
            matchedPairs = 0;
            moves = 0;
            flippedCards = [];
            gameActive = true;
            seconds = 0;

            // Hide other screens
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
            document.getElementById('paradeArea').style.display = 'none';
            const gameArea = document.getElementById('gameArea');
            gameArea.style.display = 'flex';

            // Pick random costumes
            const selected = shuffleArray(allCostumes).slice(0, pairs);
            const cardData = shuffleArray([...selected, ...selected]);

            // Set board class
            const board = document.getElementById('board');
            board.className = 'board';
            if (pairs === 6) board.classList.add('size-4x3');
            else if (pairs === 8) board.classList.add('size-4x4');
            else board.classList.add('size-4x5');

            board.innerHTML = '';
            cards = [];

            cardData.forEach((costume, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">
                        <span class="card-emoji">${costume.emoji}</span>
                        <span class="card-label">${costume.label}</span>
                    </div>
                `;
                card.dataset.index = index;
                card.dataset.id = costume.label;
                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
                cards.push(card);
            });

            updateStats();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                document.getElementById('timerDisplay').textContent = `⏱️ ${m}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function flipCard(card) {
            if (!gameActive) return;
            if (flippedCards.length >= 2) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                updateStats();
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.id === card2.dataset.id;

            if (match) {
                matchedPairs++;
                card1.classList.add('matched');
                card2.classList.add('matched');
                flippedCards = [];
                updateStats();
                launchConfetti();

                if (matchedPairs === totalPairs) {
                    gameActive = false;
                    clearInterval(timerInterval);
                    setTimeout(showWin, 800);
                }
            } else {
                gameActive = false;
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    gameActive = true;
                }, 900);
            }
        }

        function updateStats() {
            document.getElementById('movesDisplay').textContent = `מהלכים: ${moves}`;
            document.getElementById('pairsDisplay').textContent = `זוגות: ${matchedPairs}/${totalPairs}`;
        }

        function showWin() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('winScreen').style.display = 'block';

            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            const timeStr = `${m}:${s.toString().padStart(2, '0')}`;

            document.getElementById('winStats').innerHTML =
                `מצאתם את כל ${totalPairs} הזוגות!<br>` +
                `מהלכים: ${moves} | זמן: ${timeStr}`;

            // Stars based on efficiency
            const efficiency = totalPairs / moves;
            let starCount;
            if (efficiency >= 0.8) starCount = 5;
            else if (efficiency >= 0.6) starCount = 4;
            else if (efficiency >= 0.4) starCount = 3;
            else if (efficiency >= 0.25) starCount = 2;
            else starCount = 1;

            let starsHTML = '';
            for (let i = 0; i < 5; i++) {
                starsHTML += i < starCount ? '⭐' : '<span style="opacity:0.2">⭐</span>';
            }
            document.getElementById('winStars').innerHTML = starsHTML;

            launchConfetti();
            setTimeout(launchConfetti, 400);
            setTimeout(launchConfetti, 800);
        }

        function backToMenu() {
            clearInterval(timerInterval);
            clearInterval(autoPlayInterval);
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
            document.getElementById('paradeArea').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
            document.getElementById('autoBtn').textContent = '▶ תצוגה אוטומטית';
            document.getElementById('autoBtn').classList.remove('playing');
        }

        // Costume Parade
        function startParade() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('paradeArea').style.display = 'block';
            paradeIndex = 0;

            // Build dots
            const dotsContainer = document.getElementById('paradeDots');
            dotsContainer.innerHTML = '';
            allCostumes.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'parade-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => showCostumeAt(i);
                dotsContainer.appendChild(dot);
            });

            showCostume();
        }

        function showCostume() {
            const c = allCostumes[paradeIndex];
            const costumeDiv = document.getElementById('paradeCostume');
            costumeDiv.style.animation = 'none';
            costumeDiv.offsetHeight; // trigger reflow
            costumeDiv.style.animation = 'costumeIn 0.6s ease';

            document.getElementById('paradeEmoji').textContent = c.emoji;
            document.getElementById('paradeName').textContent = c.label;
            document.getElementById('paradeDesc').textContent = c.desc;

            document.querySelectorAll('.parade-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === paradeIndex);
            });
        }

        function showCostumeAt(i) {
            paradeIndex = i;
            showCostume();
        }

        function nextCostume() {
            paradeIndex = (paradeIndex + 1) % allCostumes.length;
            showCostume();
        }

        function prevCostume() {
            paradeIndex = (paradeIndex - 1 + allCostumes.length) % allCostumes.length;
            showCostume();
        }

        function toggleAutoPlay() {
            const btn = document.getElementById('autoBtn');
            if (autoPlayInterval) {
                clearInterval(autoPlayInterval);
                autoPlayInterval = null;
                btn.textContent = '▶ תצוגה אוטומטית';
                btn.classList.remove('playing');
            } else {
                autoPlayInterval = setInterval(nextCostume, 2500);
                btn.textContent = '⏸ עצור';
                btn.classList.add('playing');
            }
        }

        function launchConfetti() {
            const emojis = ['🎉', '✨', '🎊', '⭐', '🌟', '🎭', '👑', '💜', '🃏'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 80);
            }
        }
    </script>
</body>
</html>
