<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תצוגת תחפושות פורים</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a0533, #2d1b69, #1a0533);
            z-index: 0;
        }

        .bg-stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            pointer-events: none;
        }

        .bg-star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.1; transform: scale(0.8); }
            to { opacity: 0.8; transform: scale(1.2); }
        }

        /* Floating emojis */
        .floating-emoji {
            position: fixed;
            font-size: 28px;
            animation: floatUp linear forwards;
            pointer-events: none;
            z-index: 2;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) rotate(360deg) scale(1); opacity: 0; }
        }

        /* Main container */
        .slideshow-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Intro screen */
        .intro-screen {
            text-align: center;
            animation: fadeInUp 1s ease;
        }

        .intro-screen h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .intro-emojis {
            font-size: 50px;
            margin-bottom: 15px;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .intro-subtitle {
            font-size: 1.2em;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
        }

        .play-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 18px 50px;
            font-size: 1.3em;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(240, 147, 251, 0.4);
            animation: pulse 2s ease infinite;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(240, 147, 251, 0.6);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(240, 147, 251, 0.4); }
            50% { box-shadow: 0 0 50px rgba(240, 147, 251, 0.7); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Slide */
        .slide-wrapper {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slide {
            position: relative;
            max-width: 85vw;
            max-height: 70vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(240, 147, 251, 0.3);
            animation: slideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .slide img {
            display: block;
            max-width: 85vw;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 20px;
        }

        /* Different transition animations */
        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.7) rotate(-3deg); }
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px) scale(0.9); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px) scale(0.9); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes slideInFlip {
            from { opacity: 0; transform: perspective(800px) rotateY(90deg); }
            to { opacity: 1; transform: perspective(800px) rotateY(0deg); }
        }

        @keyframes slideInZoom {
            from { opacity: 0; transform: scale(1.5); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes slideInDrop {
            from { opacity: 0; transform: translateY(-80px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .slide.anim-left { animation: slideInLeft 0.7s ease; }
        .slide.anim-right { animation: slideInRight 0.7s ease; }
        .slide.anim-flip { animation: slideInFlip 0.8s ease; }
        .slide.anim-zoom { animation: slideInZoom 0.7s ease; }
        .slide.anim-drop { animation: slideInDrop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .slide.anim-default { animation: slideIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Photo frame glow */
        .slide::before {
            content: '';
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: linear-gradient(135deg, #f093fb, #f5576c, #fda085, #f093fb);
            border-radius: 22px;
            z-index: -1;
            animation: borderGlow 3s ease infinite;
            background-size: 300% 300%;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Caption */
        .caption {
            text-align: center;
            margin-top: 20px;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .caption-emoji {
            font-size: 36px;
            margin-bottom: 5px;
        }

        .caption-title {
            font-size: 1.6em;
            font-weight: bold;
            background: linear-gradient(135deg, #f093fb, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .caption-desc {
            font-size: 1em;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 100;
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        .ctrl-btn.active {
            background: rgba(240, 147, 251, 0.3);
            border-color: #f093fb;
        }

        /* Progress dots */
        .dots {
            display: flex;
            gap: 6px;
            padding: 0 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.4s;
            cursor: pointer;
        }

        .dot.active {
            background: #f093fb;
            width: 24px;
            border-radius: 4px;
        }

        /* Progress bar */
        .progress-track {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            z-index: 100;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c, #fda085);
            transition: width 0.3s ease;
            border-radius: 0 2px 2px 0;
        }

        /* Music visualizer */
        .visualizer {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 30px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .visualizer.playing {
            opacity: 1;
        }

        .viz-bar {
            width: 4px;
            background: linear-gradient(to top, #f093fb, #f5576c);
            border-radius: 2px;
            animation: vizPulse 0.5s ease infinite alternate;
        }

        @keyframes vizPulse {
            from { height: 4px; }
            to { height: 25px; }
        }

        /* Spotlight effect */
        .spotlight {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: -10px;
            font-size: 24px;
            animation: confettiFall linear forwards;
            pointer-events: none;
            z-index: 200;
        }

        @keyframes confettiFall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* Back link */
        .back-link {
            position: fixed;
            top: 15px;
            right: 15px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.9em;
            z-index: 100;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }

        /* End screen */
        .end-screen {
            display: none;
            text-align: center;
            animation: fadeInUp 1s ease;
        }

        .end-screen h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #f093fb, #f5576c, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .end-emojis {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .end-text {
            color: rgba(255,255,255,0.7);
            font-size: 1.1em;
            margin-bottom: 25px;
        }

        .end-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .end-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 16px;
            padding: 12px 30px;
            font-size: 1em;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }

        .end-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .end-btn.primary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .intro-screen h1 { font-size: 1.8em; }
            .intro-emojis { font-size: 36px; }
            .play-btn { padding: 14px 36px; font-size: 1.1em; }
            .slide img { max-width: 92vw; max-height: 60vh; }
            .caption-title { font-size: 1.3em; }
            .dots { gap: 4px; }
            .dot { width: 6px; height: 6px; }
            .dot.active { width: 18px; }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>
    <div class="bg-stars" id="bgStars"></div>
    <div class="spotlight"></div>
    <a href="index.html" class="back-link">↩ חזרה לחידון</a>

    <div class="progress-track" id="progressTrack" style="display:none;">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>

    <div class="visualizer" id="visualizer"></div>

    <div class="slideshow-container">
        <!-- Intro -->
        <div class="intro-screen" id="introScreen">
            <div class="intro-emojis">🎭👑🦁🕷️🧙‍♂️</div>
            <h1>תצוגת תחפושות פורים</h1>
            <p class="intro-subtitle">מסע בתחפושות לאורך השנים</p>
            <button class="play-btn" onclick="startSlideshow()">▶ התחילו את התצוגה</button>
        </div>

        <!-- Slides -->
        <div class="slide-wrapper" id="slideWrapper">
            <div class="slide" id="slideFrame">
                <img id="slideImg" src="" alt="">
            </div>
            <div class="caption">
                <div class="caption-emoji" id="captionEmoji"></div>
                <div class="caption-title" id="captionTitle"></div>
                <div class="caption-desc" id="captionDesc"></div>
            </div>
        </div>

        <!-- End -->
        <div class="end-screen" id="endScreen">
            <div class="end-emojis">🎉🎭👑✨</div>
            <h1>!פורים שמח</h1>
            <p class="end-text">תודה שצפיתם בתצוגת התחפושות שלנו</p>
            <div class="end-btns">
                <button class="end-btn primary" onclick="startSlideshow()">🔄 צפו שוב</button>
                <button class="end-btn" onclick="location.href='index.html'">📝 לחידון הפורים</button>
                <button class="end-btn" onclick="location.href='memory.html'">🃏 למשחק הזיכרון</button>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls" id="controls" style="display:none;">
        <button class="ctrl-btn" onclick="prevSlide()" title="הקודם">→</button>
        <button class="ctrl-btn" id="playPauseBtn" onclick="toggleAutoPlay()" title="נגן/עצור">⏸</button>
        <div class="dots" id="dots"></div>
        <button class="ctrl-btn" onclick="nextSlide()" title="הבא">←</button>
        <button class="ctrl-btn" id="musicBtn" onclick="toggleMusic()" title="מוזיקה">🔊</button>
    </div>

    <script>
        const slides = [
            {

            },
            {
                src: "photos/12-candy-robot.jpg",
                emoji: "🍭🤖",
                title: "נסיכת הממתקים ולוחם הרובוטים",

            },
            {
                src: "photos/14-chess-king.jpg",

            },

                emoji: "⚡",

            },
            {

                emoji: "🐾",
                title: "קרואלה דה ויל",
                desc: "פאה שחור-לבן, בואה וכפפות דלמטי"
            },
            {
                src: "photos/03-hippie.jpg",
                emoji: "✌️",
                title: "היפית - Peace!",
                desc: "סרט ראש, משקפי שמש וחצאית תחרה"
            },
            {
                src: "photos/17-hippie2.jpg",
                emoji: "✌️",
                title: "היפית - זווית נוספת",
                desc: "שלום ואהבה!"
            },
            {
                src: "photos/04-family.jpg",
                emoji: "👨‍👩‍👧‍👦",
                title: "כל המשפחה בתחפושות!",
                desc: "שחמט, נסיכה, ינשוף וספורטאית"
            }
        ];

        const animations = ['anim-default', 'anim-left', 'anim-right', 'anim-flip', 'anim-zoom', 'anim-drop'];
        let currentSlide = 0;
        let autoPlayInterval = null;
        let musicPlaying = false;
        let audioCtx = null;

        // Create background stars
        function createStars() {
            const container = document.getElementById('bgStars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'bg-star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 3 + 1) + 's';
                star.style.animationDelay = (Math.random() * 3) + 's';
                container.appendChild(star);
            }
        }

        // Create visualizer bars
        function createVisualizer() {
            const viz = document.getElementById('visualizer');
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'viz-bar';
                bar.style.animationDuration = (0.3 + Math.random() * 0.5) + 's';
                bar.style.animationDelay = (Math.random() * 0.5) + 's';
                viz.appendChild(bar);
            }
        }

        // Floating emojis
        function spawnEmoji() {
            const emojis = ['🎭', '👑', '✨', '🌟', '🎉', '🎊', '💜', '🦁', '🕷️', '🦉', '🍓', '🍭', '♟️', '⚡', '🏹'];
            const emoji = document.createElement('div');
            emoji.className = 'floating-emoji';
            emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.animationDuration = (6 + Math.random() * 6) + 's';
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 12000);
        }

        // Music using Web Audio API
        function createMusic() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Simple cheerful melody
            const notes = [
                { freq: 523.25, dur: 0.25 }, // C5
                { freq: 587.33, dur: 0.25 }, // D5
                { freq: 659.25, dur: 0.25 }, // E5
                { freq: 523.25, dur: 0.25 }, // C5
                { freq: 659.25, dur: 0.25 }, // E5
                { freq: 587.33, dur: 0.25 }, // D5
                { freq: 523.25, dur: 0.5  }, // C5
                { freq: 0, dur: 0.25 },      // rest
                { freq: 493.88, dur: 0.25 }, // B4
                { freq: 523.25, dur: 0.25 }, // C5
                { freq: 587.33, dur: 0.25 }, // D5
                { freq: 659.25, dur: 0.5  }, // E5
                { freq: 783.99, dur: 0.25 }, // G5
                { freq: 659.25, dur: 0.25 }, // E5
                { freq: 587.33, dur: 0.5  }, // D5
                { freq: 0, dur: 0.25 },      // rest
                { freq: 523.25, dur: 0.25 }, // C5
                { freq: 659.25, dur: 0.25 }, // E5
                { freq: 783.99, dur: 0.25 }, // G5
                { freq: 880.00, dur: 0.5  }, // A5
                { freq: 783.99, dur: 0.25 }, // G5
                { freq: 659.25, dur: 0.25 }, // E5
                { freq: 523.25, dur: 0.5  }, // C5
                { freq: 0, dur: 0.5 },       // rest
            ];

            let totalDur = notes.reduce((sum, n) => sum + n.dur, 0);
            let loopCount = 0;
            const maxLoops = 50;

            function playLoop() {
                if (!musicPlaying || loopCount >= maxLoops) return;
                loopCount++;
                let time = audioCtx.currentTime;

                notes.forEach(note => {
                    if (note.freq > 0) {
                        // Melody
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = note.freq;
                        gain.gain.setValueAtTime(0, time);
                        gain.gain.linearRampToValueAtTime(0.08, time + 0.02);
                        gain.gain.linearRampToValueAtTime(0.06, time + note.dur * 0.5);
                        gain.gain.linearRampToValueAtTime(0, time + note.dur - 0.02);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(time);
                        osc.stop(time + note.dur);

                        // Harmony (softer, third above)
                        const osc2 = audioCtx.createOscillator();
                        const gain2 = audioCtx.createGain();
                        osc2.type = 'triangle';
                        osc2.frequency.value = note.freq * 1.25;
                        gain2.gain.setValueAtTime(0, time);
                        gain2.gain.linearRampToValueAtTime(0.03, time + 0.02);
                        gain2.gain.linearRampToValueAtTime(0, time + note.dur - 0.02);
                        osc2.connect(gain2);
                        gain2.connect(audioCtx.destination);
                        osc2.start(time);
                        osc2.stop(time + note.dur);
                    }
                    time += note.dur;
                });

                setTimeout(playLoop, totalDur * 1000);
            }

            musicPlaying = true;
            playLoop();
        }

        function toggleMusic() {
            const btn = document.getElementById('musicBtn');
            const viz = document.getElementById('visualizer');
            if (musicPlaying) {
                musicPlaying = false;
                if (audioCtx) audioCtx.close();
                audioCtx = null;
                btn.textContent = '🔇';
                viz.classList.remove('playing');
            } else {
                createMusic();
                btn.textContent = '🔊';
                viz.classList.add('playing');
            }
        }

        // Dots
        function createDots() {
            const container = document.getElementById('dots');
            container.innerHTML = '';
            slides.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                container.appendChild(dot);
            });
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }

        function updateProgress() {
            const pct = ((currentSlide + 1) / slides.length) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
        }

        // Slide display
        function showSlide() {
            const s = slides[currentSlide];
            const frame = document.getElementById('slideFrame');
            const img = document.getElementById('slideImg');

            // Random animation
            const anim = animations[Math.floor(Math.random() * animations.length)];
            frame.className = 'slide';
            void frame.offsetHeight; // reflow
            frame.classList.add(anim);

            img.src = s.src;
            img.alt = s.title;

            document.getElementById('captionEmoji').textContent = s.emoji;
            document.getElementById('captionTitle').textContent = s.title;
            document.getElementById('captionDesc').textContent = s.desc;

            // Reset caption animation
            const caption = document.querySelector('.caption');
            caption.style.animation = 'none';
            void caption.offsetHeight;
            caption.style.animation = 'fadeInUp 0.8s ease 0.3s both';

            updateDots();
            updateProgress();
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                showSlide();
            } else {
                showEndScreen();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                showSlide();
            }
        }

        function goToSlide(i) {
            currentSlide = i;
            showSlide();
        }

        function toggleAutoPlay() {
            const btn = document.getElementById('playPauseBtn');
            if (autoPlayInterval) {
                clearInterval(autoPlayInterval);
                autoPlayInterval = null;
                btn.textContent = '▶';
                btn.classList.remove('active');
            } else {
                autoPlayInterval = setInterval(() => {
                    if (currentSlide < slides.length - 1) {
                        nextSlide();
                    } else {
                        clearInterval(autoPlayInterval);
                        autoPlayInterval = null;
                        btn.textContent = '▶';
                        btn.classList.remove('active');
                        showEndScreen();
                    }
                }, 4000);
                btn.textContent = '⏸';
                btn.classList.add('active');
            }
        }

        function showEndScreen() {
            if (autoPlayInterval) {
                clearInterval(autoPlayInterval);
                autoPlayInterval = null;
            }
            document.getElementById('slideWrapper').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            document.getElementById('controls').style.display = 'none';
            launchConfetti();
            setTimeout(launchConfetti, 500);
            setTimeout(launchConfetti, 1000);
        }

        function startSlideshow() {
            document.getElementById('introScreen').style.display = 'none';
            document.getElementById('endScreen').style.display = 'none';
            document.getElementById('slideWrapper').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('progressTrack').style.display = 'block';

            currentSlide = 0;
            createDots();
            showSlide();

            // Start music
            if (!musicPlaying) {
                createMusic();
                document.getElementById('musicBtn').textContent = '🔊';
                document.getElementById('visualizer').classList.add('playing');
            }

            // Start auto-play
            toggleAutoPlay();
        }

        function launchConfetti() {
            const emojis = ['🎉', '✨', '🎊', '⭐', '🌟', '🎭', '👑', '💜', '🦉', '🍓', '🦁'];
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 4000);
                }, i * 60);
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') nextSlide();
            if (e.key === 'ArrowUp' || e.key === 'Backspace') prevSlide();
            if (e.key === ' ') { e.preventDefault(); toggleAutoPlay(); }
            if (e.key === 'm') toggleMusic();
        });

        // Touch swipe
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', (e) => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextSlide(); // swipe left
                else prevSlide(); // swipe right
            }
        });

        // Init
        createStars();
        createVisualizer();
        setInterval(spawnEmoji, 2000);
    </script>
</body>
</html>
